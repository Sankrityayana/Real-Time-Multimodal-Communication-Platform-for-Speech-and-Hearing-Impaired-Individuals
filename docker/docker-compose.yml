services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../backend/.env.example
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: "change-me"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/multimodal"
      REDIS_URL: "redis://redis:6379/0"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      AI_SERVICE_BASE_URL: "http://ai-services:8100"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - ai-services

  ai-services:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai-services
    env_file:
      - ../ai-services/.env.example
    ports:
      - "8100:8100"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: multimodal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data:
