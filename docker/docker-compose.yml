services:
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    env_file:
      - ../backend/.env.example
    environment:
      DJANGO_DEBUG: "False"
      DJANGO_SECRET_KEY: "change-me"
      DATABASE_URL: "sqlite:////data/db.sqlite3"
      USE_REDIS: "False"
      CORS_ALLOWED_ORIGINS: "http://localhost:5173"
      AI_SERVICE_BASE_URL: "http://ai-services:8100"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
    volumes:
      - backend_data:/data
    ports:
      - "8000:8000"
    depends_on:
      - ai-services

  ai-services:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai-services
    env_file:
      - ../ai-services/.env.example
    ports:
      - "8100:8100"

volumes:
  backend_data:
